<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>办公设计规范</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    
    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: #000000;
    }
    
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    
    #galaxy-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    
    hana-viewer {
      width: 100vw;
      height: 100vh;
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 2;
      pointer-events: auto;
    }
    
    #galaxy-container canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    /* 防止闪白的背景层 */
    #app::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      z-index: -1;
    }
    
    /* 加载动画 */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    
    #loading.hidden {
      opacity: 0;
      visibility: hidden;
    }
    
    .loading-bar {
      width: 120px;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }
    
    .loading-bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 30%;
      background: #ffffff;
      animation: loading 1.5s ease-in-out infinite;
    }
    
    @keyframes loading {
      0% { left: -30%; }
      100% { left: 100%; }
    }
    
    /* UI 容器 */
    .ui-container {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px 160px 24px;
      gap: 40px;
      z-index: 10;
    }
    
    /* 字段容器 */
    .text-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      gap: 20px;
      width: 100%;
    }
    
    /* 标题 */
    .title {
      font-size: 48px;
      font-weight: 500;
      color: #ffffff;
      text-align: center;
      line-height: 1.2;
      opacity: 0;
      filter: blur(10px);
      transform: translateY(30px);
    }
    
    .title.animate {
      animation: blurFadeInUp 0.8s ease-out forwards;
    }
    
    /* 副标题 */
    .subtitle {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
      line-height: 1.6;
      opacity: 0;
      filter: blur(10px);
      transform: translateY(30px);
    }
    
    .subtitle.animate {
      animation: blurFadeInUp 0.8s ease-out forwards;
      animation-delay: 0.2s;
    }
    
    /* 按钮 */
    .cta-button {
      width: 200px;
      height: 52px;
      border-radius: 1000px;
      background: #008CFF;
      border: 1px solid #269DFF;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px 60px;
      cursor: pointer;
      transition: all 0.2s ease;
      opacity: 0;
      transform: translateY(30px);
    }
    
    .cta-button.animate {
      animation: fadeInUp 0.6s ease-out forwards;
      animation-delay: 0.4s;
    }
    
    .cta-button:hover {
      background: #269DFF;
    }
    
    .cta-button span {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      white-space: nowrap;
    }
    
     /* 入场动画 */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes blurFadeInUp {
      0% {
        opacity: 0;
        filter: blur(10px);
        transform: translateY(30px);
      }
      50% {
        opacity: 0.5;
        filter: blur(5px);
        transform: translateY(10px);
      }
      100% {
        opacity: 1;
        filter: blur(0px);
        transform: translateY(0);
      }
    }
    
    /* 弹窗蒙层 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    
    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    
    /* 弹窗内容 */
    .modal-content {
      width: calc(100vw - 160px);
      height: calc(100vh - 160px);
      border: 1px solid rgb(255 255 255 / 10%);
      border-radius: 32px;
      transform: scale(0.95);
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      display: flex;
      overflow: hidden;
    }
    
    .modal-overlay.active .modal-content {
      transform: scale(1);
      opacity: 1;
    }
    
    /* 左侧导航 */
    .modal-sidebar {
      width: 200px;
      min-width: 200px;
      border-right: 1px solid rgb(255 255 255 / 10%);
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .nav-item {
      padding: 6px 16px;
      border-radius: 1000px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .nav-item:hover {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.9);
    }
    
    .nav-item.active {
      background: #ffffff;
      color: #000000;
      font-weight: 600;
    }
    
    /* 中间内容区 */
    .modal-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #000000;
    }
    
    .modal-header {
      padding: 24px 32px;
      border-bottom: 1px solid rgb(255 255 255 / 10%);
    }
    
    .modal-title {
      font-size: 20px;
      font-weight: 600;
      color: #ffffff;
    }
    
    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
    }
    
    .preview-section {
      margin-top: 24px;
    }
    
    .preview-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    
    .preview-box {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgb(255 255 255 / 10%);
      border-radius: 12px;
      padding: 24px;
      min-height: 200px;
    }
    
    /* 右侧说明 */
    .modal-right {
      width: 280px;
      min-width: 280px;
      border-left: 1px solid rgb(255 255 255 / 10%);
      padding: 24px;
      overflow-y: auto;
    }
    
    .right-title {
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 16px;
    }
    
    .right-content {
      font-size: 13px;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.6);
    }
    
    .right-content code {
      background: rgba(255, 255, 255, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
    }
    
    /* 代码块样式 */
    .code-block {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgb(255 255 255 / 10%);
      border-radius: 8px;
      padding: 16px;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.9);
      overflow-x: auto;
      margin: 12px 0;
    }
    
    /* 响应式 */
    @media (max-width: 1200px) {
      .modal-right {
        display: none;
      }
    }
    
    @media (max-width: 768px) {
      .modal-content {
        width: calc(100vw - 32px);
        height: calc(100vh - 32px);
        flex-direction: column;
      }
      
      .modal-sidebar {
        width: 100%;
        min-width: auto;
        flex-direction: row;
        padding: 12px;
        border-right: none;
        border-bottom: 1px solid rgb(255 255 255 / 10%);
        overflow-x: auto;
      }
      
      .nav-item {
        white-space: nowrap;
      }
    }
  </style>
</head>

   <script type="module">
    import Galaxy from './galaxy.js';
    
     const loading = document.getElementById('loading');
    const splineViewer = document.getElementById('spline-viewer');
    const bgm = document.getElementById('bgm');
    
    // 初始化 Galaxy
    const galaxyContainer = document.getElementById('galaxy-container');
    if (galaxyContainer) {
      new Galaxy(galaxyContainer, {
        mouseRepulsion: true,
        mouseInteraction: true,
        density: 0.6,
        glowIntensity: 0.15,
        saturation: 0,
        hueShift: 140,
        twinkleIntensity: 0.2,
        rotationSpeed: 0.05,
        repulsionStrength: 2,
        autoCenterRepulsion: 0,
        starSpeed: 0.8,
        speed: 1.2,
        transparent: true
      });
    }
    
    // 监听 Spline 加载完成
    let loaded = false;
    const hideLoading = () => {
      if (!loaded) {
        loaded = true;
        loading.classList.add('hidden');
        
        // 触发 UI 入场动画
        document.querySelector('.title').classList.add('animate');
        document.querySelector('.subtitle').classList.add('animate');
        document.querySelector('.cta-button').classList.add('animate');
      }
    };
    
    // 方式1: 监听 hana-viewer 的 loaded 事件
    splineViewer.addEventListener('loaded', hideLoading);
    
    // 方式2: 超时自动隐藏（5秒）
    setTimeout(hideLoading, 5000);
    
    // 方式3: 检查 canvas 是否已渲染
    const checkCanvas = setInterval(() => {
      const canvas = splineViewer.querySelector('canvas');
      if (canvas) {
        clearInterval(checkCanvas);
        hideLoading();
      }
    }, 100);
    
    // 播放 BGM（首次点击页面后）
    const playBGM = () => {
      bgm.volume = 0.5;
      bgm.play().catch(() => {
        // 自动播放被阻止，等待用户交互
      });
      document.removeEventListener('click', playBGM);
    };
    
    // 尝试自动播放
    bgm.volume = 0.5;
    bgm.play().catch(() => {
      // 如果自动播放失败，等待用户点击
      document.addEventListener('click', playBGM);
    });
    
    // 弹窗控制
    const openModalBtn = document.getElementById('open-modal');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modal-title');
    const modalBody = document.getElementById('modal-body');
    const rightContent = document.getElementById('right-content');

    // 文件内容缓存
    let fileContents = {
      markdown: '',
      tokens: '',
      ai: ''
    };

    // 异步加载文件内容 - 从 Supabase 获取
    async function loadFileContents() {
      try {
        const [markdownRes, tokensRes, aiRes] = await Promise.all([
          fetch('https://db0cwzml9gxiye.database.sankuai.com/storage/v1/object/public/public-assets/styles/markdown.css').then(r => r.text()).catch(() => '加载失败'),
          fetch('https://db0cwzml9gxiye.database.sankuai.com/storage/v1/object/public/public-assets/styles/tokens.css').then(r => r.text()).catch(() => '加载失败'),
          fetch('https://db0cwzml9gxiye.database.sankuai.com/storage/v1/object/public/public-assets/styles/ai-format-prompt.md').then(r => r.text()).catch(() => '加载失败')
        ]);

        // 重新渲染当前选中的内容
        const activeNav = document.querySelector('.nav-item.active[data-section]');
        if (activeNav) {
          switchContent(activeNav.dataset.section);

      } catch (e) {

    }

    // 简单的语法高亮函数 - 适配深色背景
    function highlightCode(code, type) {
      if (!code) return '';
      let html = escapeHtml(code);
      
      if (type === 'css') {
        // CSS 高亮 - VS Code 深色主题配色
        html = html
          // 注释 /* */ - 绿色
          .replace(/(\/\*[\s\S]*?\*\/)/g, '<span style="color: #6a9955;">$1</span>')
          // 选择器 - 浅黄色
          .replace(/(^|\n)([^{\n]+)(\{)/g, '$1<span style="color: #dcdcaa;">$2</span>$3')
          // 属性名 - 浅蓝色
          .replace(/([a-zA-Z-]+)(\s*:)/g, '<span style="color: #9cdcfe;">$1</span>$2')
          // 属性值中的颜色值 - 橙色
          .replace(/(:\s*)(rgba?\([^)]+\)|#[a-fA-F0-9]+)/g, '$1<span style="color: #ce9178;">$2</span>')
          // 属性值中的数字和单位 - 浅绿色/青色
          .replace(/(:\s*)(-?\d+\.?\d*)(px|rem|em|%|s|ms|deg|vh|vw)?/g, '$1<span style="color: #b5cea8;">$2</span><span style="color: #4ec9b0;">$3</span>')
          // CSS 变量 -- - 亮蓝色
          .replace(/(--[a-zA-Z0-9-]+)/g, '<span style="color: #4fc1ff;">$1</span>')
          // 关键字 - 蓝色
          .replace(/\b(root|dark|light|important|none|auto|inherit|initial)\b/g, '<span style="color: #569cd6;">$1</span>');
      } else if (type === 'markdown') {
        // Markdown 高亮
        html = html
          // 注释 /* */ - 绿色
          .replace(/(\/\*[\s\S]*?\*\/)/g, '<span style="color: #6a9955;">$1</span>')
          // 标题 ## - 蓝色
          .replace(/^(##?#?\s+.+)$/gm, '<span style="color: #569cd6;">$1</span>')
          // emoji - 金色
          .replace(/([\u{1F300}-\u{1F9FF}])/gu, '<span style="color: #ffd700;">$1</span>')
          // 代码块 ``` - 橙色
          .replace(/(```[a-z]*)/g, '<span style="color: #ce9178;">$1</span>')
          // 行内代码 ` - 橙色
          .replace(/(`[^`]+`)/g, '<span style="color: #ce9178;">$1</span>')
          // 列表符号 - * 1. - 蓝色
          .replace(/^([\s]*)([-*]|\d+\.)(\s+)/gm, '$1<span style="color: #569cd6;">$2</span>$3')
          // 强调 ** - 黄色
          .replace(/(\*\*[^*]+\*\*)/g, '<span style="color: #dcdcaa;">$1</span>')
          // 链接 - 亮蓝色
          .replace(/(https?:\/\/[^\s]+)/g, '<span style="color: #4fc1ff;">$1</span>');
      }
      
      return html;
    }

        right: `

          <p><code>./styles/tokens.css</code></p>
          <p style="margin-top: 16px;"><strong>使用方式</strong></p>
          <div class="code-block">color: var(--color-text-1);
font-size: var(--font-size-14);
border-radius: var(--radius-8);</div>
          <p style="margin-top: 16px;"><strong>包含系统</strong></p>
          <ul style="padding-left: 16px; margin: 8px 0;">
            <li>Color - 10种主题色系</li>
            <li>Typography - 12级字号</li>
            <li>Radius - 12级圆角</li>
            <li>Shadow - 4级阴影</li>
            <li>Spacing - 基础间距</li>
            <li>Border - 3级边框</li>
          </ul>
        `
      },
      ai: {
        title: 'AI 输出规范',
        getBody: () => `<pre style="background: transparent; border: none; border-radius: 0; padding: 0; font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace; font-size: 13px; line-height: 1.7; overflow-x: auto; white-space: pre; word-wrap: normal; max-height: calc(100vh - 220px); overflow-y: auto; color: #d4d4d4;">${highlightCode(fileContents.ai, 'markdown') || '加载中...'}</pre>`,
        right: `
          <p><strong>文件路径</strong></p>
          <p><code>./styles/ai-format-prompt.md</code></p>
          <p style="margin-top: 16px;"><strong>核心规则</strong></p>
          <ul style="padding-left: 16px; margin: 8px 0;">
            <li>标题只使用 ## 和 ####</li>
            <li>## 主标题必须有 emoji</li>
            <li>表格列数必须一致</li>
            <li>有序列表序号必须递增</li>
            <li>代码块必须指定语言</li>
            <li>使用 CSS 变量而非硬编码</li>
          </ul>
          <p style="margin-top: 16px;"><strong>使用方式</strong></p>
          <p>作为 system prompt 传入 AI API</p>
        `
      }
    };

    // HTML 转义函数
    function escapeHtml(text) {
      if (!text) return '';
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
    
    // 切换内容
    function switchContent(section) {
      const data = contentData[section];
      modalTitle.textContent = data.title;
      modalBody.innerHTML = data.getBody ? data.getBody() : data.body;
      rightContent.innerHTML = data.right;
      
      navItems.forEach(item => {
        item.classList.toggle('active', item.dataset.section === section);
      });
    }
    
    // 页面加载时异步获取文件内容
    loadFileContents();
    
    // 导航点击
    navItems.forEach(item => {
      item.addEventListener('click', () => {
        switchContent(item.dataset.section);
      });
    });
    
    // 初始化内容
    switchContent('markdown');
    
    openModalBtn.addEventListener('click', () => {
      modal.classList.add('active');
    });
    
    // 点击蒙层关闭弹窗
    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        modal.classList.remove('active');
      }
    });
  </script>
</body>
</html>
